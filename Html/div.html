




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div element</title>
</head>
<body>
    <p>Div element</p>
    <div>
        <p>This is a div element.</p>
        <p>Div is a block-level element that is used to group other elements together.</p>
        <p>It does not have any semantic meaning and is often used for styling purposes.</p>
    </div>

    <div>
        <a href="https://www.google.com">Visit Google</a>
        <a href="https://www.youtube.com" target="_blank">YouTube website</a>
    </div>
    
    <a href="https://www.facebook.com">Visit Facebook</a>

</body>
</html>
