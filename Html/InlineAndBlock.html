<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Inline vs block elements</title>
</head>
<body>
    <!-- Block Elements -->
    <div>This is a block element.</div>
    <p>This is another block element.</p>
    <p>Takes up the full width available (whole block)</p>
    <p>start from new line</p>

    <!-- Inline Elements -->
    <span>This is an inline element.</span>
    <span>Takes up only necessary width</span>

    <span>does not start from new line</span>
</body>
</html>
